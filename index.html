<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="murakaev.dev — developer & problem solver, portfolio in progress"
    />
    <meta name="author" content="murakaev" />
    <title>murakaev</title>
    <meta property="og:title" content="murakaev.dev" />
    <meta property="og:description" content="developer · problem solver" />
    <meta property="og:type" content="website" />
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="grid__bg"></div>
    <main>
      <section class="terminal" aria-label="Terminal">
        <header class="terminal__header">
          <div class="terminal__controls">
            <span class="terminal__control terminal__control--red"></span>
            <span class="terminal__control terminal__control--yellow"></span>
            <span class="terminal__control terminal__control--green"></span>
          </div>
          <div class="terminal__path">
            <span class="terminal__path-home">~/</span>
            murakaev.dev
            <span class="terminal__branch">‹main›</span>
          </div>
          <div class="terminal__spacer"></div>
        </header>
        <div class="terminal__body">
          <div class="terminal__line terminal__line--command">
            <span class="terminal__prompt">❯</span>
            <span class="terminal__command">
              cat <span class="terminal__argument">./portfolio/index.md</span>
            </span>
          </div>
          <div class="terminal__output">
            <h1 class="terminal__output-name">
              <span class="terminal__comment">//</span>murakaev
            </h1>
            <p class="terminal__output-subtitle">
              Разрабатываю сайты и чат-боты <br> ! Сайт в процессе разработки !
            </p>
            <ul class="terminal__tags">
              <li class="terminal__tag terminal__tag--blue">#python</li>
              <li class="terminal__tag terminal__tag--purple">#html/css</li>
              <li class="terminal__tag terminal__tag--yellow">#js</li>
            </ul>
            <div class="terminal__status">
              <span class="terminal__status-indicator"></span>
              <span class="terminal__status-text">Прогресс разработки:</span>
              <span class="terminal__progress-bar" aria-hidden="true"
                >███████████░░░░░</span
              >
              <span class="terminal__progress-value">70%</span>
            </div>
          </div>
          <div class="terminal__line terminal__line--cursor">
            <span class="terminal__prompt">❯</span>
            <span class="terminal__caret"></span>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <small>© 2026 murakaev.dev · actively building</small>
    </footer>
  </body>
</html>
